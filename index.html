<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8b1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <title>Ciclo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #1a1215;
      --primary: #8b1a1a;
      --primary-light: #c0392b;
      --accent: #e74c3c;
      --pill-color: #d4443b;
      --pill-glow: rgba(212, 68, 59, 0.3);
      --period-light: rgba(231, 76, 60, 0.25);
      --period-medium: rgba(231, 76, 60, 0.45);
      --period-heavy: rgba(231, 76, 60, 0.7);
      --text: #e8e8e8;
      --text-muted: #888;
      --border: #2d1f22;
      --primary-glow: rgba(139, 26, 26, 0.4);
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    /* ─── Setup Screen ─── */
    .setup-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 32px;
    }
    .setup-screen.active { display: flex; }
    .setup-logo {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .setup-logo span { color: var(--accent); }
    .setup-ornament {
      color: var(--primary);
      font-size: 10px;
      letter-spacing: 4px;
      opacity: 0.6;
      margin-bottom: 40px;
    }
    .setup-text {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 320px;
    }
    .setup-input {
      width: 100%;
      max-width: 360px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 1px;
    }
    .setup-input:focus { border-color: var(--primary-light); }
    .setup-input::placeholder { color: var(--text-muted); }
    .setup-btn {
      width: 100%;
      max-width: 360px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-family: 'Raleway', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
    }
    .setup-btn:hover { background: var(--primary-light); }
    .setup-error {
      color: var(--accent);
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* ─── Header ─── */
    .header {
      text-align: center;
      padding: 28px 16px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .header::after {
      content: '✦ ─────── ✦ ─────── ✦';
      display: block;
      color: var(--primary);
      font-size: 10px;
      letter-spacing: 4px;
      margin-top: 12px;
      opacity: 0.6;
    }
    .header h1 {
      font-family: 'Cinzel', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text);
    }
    .header h1 span { color: var(--accent); }
    .header-actions {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 8px;
    }
    .header-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .header-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }
    .sync-indicator {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #27ae60;
    }
    .sync-dot.offline { background: var(--text-muted); }
    .sync-dot.syncing {
      background: #f39c12;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ─── Calendar ─── */
    .calendar-section {
      padding: 20px 16px;
    }
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 20px;
    }
    .calendar-nav button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .calendar-nav button:hover {
      border-color: var(--primary);
      color: var(--text);
    }
    .calendar-month {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      min-width: 200px;
      text-align: center;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .calendar-weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 0;
    }
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      border: 1px solid transparent;
      gap: 2px;
    }
    .calendar-day:hover { border-color: var(--border); }
    .calendar-day.empty {
      cursor: default;
      pointer-events: none;
    }
    .calendar-day.today {
      border-color: var(--primary);
      font-weight: 600;
    }
    .calendar-day.today::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      border: 1px solid var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
      pointer-events: none;
    }
    .calendar-day.period-light { background: var(--period-light); }
    .calendar-day.period-medium { background: var(--period-medium); }
    .calendar-day.period-heavy { background: var(--period-heavy); }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pill-color);
      box-shadow: 0 0 4px var(--pill-glow);
    }

    /* ─── Cycle Indicators ─── */
    .cycle-day-num {
      font-size: 7px;
      line-height: 1;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .calendar-day.active-day .cycle-day-num {
      color: var(--pill-color);
    }
    .calendar-day.pause-day {
      border-color: rgba(212, 68, 59, 0.2);
      border-style: dashed;
    }
    .calendar-day.pause-day .cycle-day-num {
      color: var(--text-muted);
      font-style: italic;
    }
    .calendar-day.future-active {
      background: rgba(212, 68, 59, 0.06);
    }
    .calendar-day.future-pause {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.08);
      border-style: dashed;
    }

    /* ─── Cycle Status Card ─── */
    .cycle-card {
      margin: 0 16px 8px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
    }
    .cycle-card-phase {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .cycle-card-phase.active { color: var(--pill-color); }
    .cycle-card-phase.pause { color: var(--text-muted); }
    .cycle-card-detail {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .cycle-card-ornament {
      color: var(--primary);
      font-size: 9px;
      letter-spacing: 3px;
      opacity: 0.5;
      margin-top: 6px;
    }
    .cycle-progress {
      display: flex;
      gap: 2px;
      justify-content: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .cycle-progress-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }
    .cycle-progress-dot.filled {
      background: var(--pill-color);
      box-shadow: 0 0 3px var(--pill-glow);
    }
    .cycle-progress-dot.pause-dot {
      border-radius: 2px;
    }
    .cycle-progress-dot.pause-dot.filled {
      background: var(--text-muted);
      box-shadow: none;
    }
    .cycle-progress-separator {
      width: 4px;
    }

    /* ─── Panel Cycle Badge ─── */
    .panel-cycle-badge {
      text-align: center;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: rgba(139, 26, 26, 0.15);
      border: 1px solid rgba(139, 26, 26, 0.3);
      border-radius: 10px;
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    .panel-cycle-badge .badge-phase {
      color: var(--pill-color);
      font-weight: 600;
    }
    .panel-cycle-badge.pause-badge {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.1);
    }
    .panel-cycle-badge.pause-badge .badge-phase {
      color: var(--text-muted);
    }

    /* ─── Legend ─── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .legend-dot.pill { background: var(--pill-color); box-shadow: 0 0 4px var(--pill-glow); }
    .legend-square {
      width: 12px;
      height: 8px;
      border-radius: 2px;
    }
    .legend-square.period { background: var(--period-medium); }

    /* ─── Day Panel (Bottom Sheet) ─── */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s;
    }
    .panel-overlay.active { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .day-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 24px 20px 32px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 4px;
    }
    .panel-title::after {
      content: '── ✦ ──';
      display: block;
      color: var(--primary);
      font-size: 10px;
      margin-top: 8px;
      opacity: 0.5;
    }
    .panel-date {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* ─── Panel Sections ─── */
    .panel-section {
      margin-bottom: 24px;
    }
    .panel-section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-section-icon {
      font-size: 16px;
    }

    /* Pill Toggle */
    .pill-toggle {
      display: flex;
      gap: 10px;
    }
    .pill-option {
      flex: 1;
      padding: 12px 8px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Raleway', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .pill-option:hover { border-color: var(--primary); color: var(--text); }
    .pill-option.selected {
      border-color: var(--pill-color);
      background: rgba(212, 68, 59, 0.15);
      color: var(--text);
      box-shadow: 0 0 12px var(--pill-glow);
    }

    /* Pill Pause Message */
    .pill-pause-msg {
      padding: 12px 16px;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      letter-spacing: 1px;
      font-style: italic;
    }

    /* Time Input */
    .time-row {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .time-row.visible { display: flex; }
    .time-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .time-display {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 14px;
      text-align: center;
      letter-spacing: 2px;
    }
    .time-edit-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .time-edit-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }
    input[type="time"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 14px;
      text-align: center;
      outline: none;
      letter-spacing: 2px;
    }
    input[type="time"]:focus { border-color: var(--primary-light); }

    /* Period Selector */
    .period-selector {
      display: flex;
      gap: 8px;
    }
    .period-option {
      flex: 1;
      padding: 12px 4px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .period-option .period-icon {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .period-option:hover { border-color: var(--primary); color: var(--text); }
    .period-option.selected {
      color: var(--text);
    }
    .period-option.selected[data-level="none"] {
      border-color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
    }
    .period-option.selected[data-level="light"] {
      border-color: var(--accent);
      background: var(--period-light);
      box-shadow: 0 0 10px rgba(231, 76, 60, 0.15);
    }
    .period-option.selected[data-level="medium"] {
      border-color: var(--accent);
      background: var(--period-medium);
      box-shadow: 0 0 10px rgba(231, 76, 60, 0.25);
    }
    .period-option.selected[data-level="heavy"] {
      border-color: var(--accent);
      background: var(--period-heavy);
      box-shadow: 0 0 10px rgba(231, 76, 60, 0.4);
    }

    /* Panel Actions */
    .panel-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: 'Raleway', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-confirm {
      background: var(--primary);
      color: white;
    }
    .btn-confirm:hover { background: var(--primary-light); }

    /* ─── Ornamental Divider ─── */
    .divider {
      text-align: center;
      padding: 8px 0;
      color: var(--primary);
      font-size: 10px;
      letter-spacing: 4px;
      opacity: 0.5;
    }

    /* ─── Toast / Feedback ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 13px;
      letter-spacing: 1px;
      z-index: 500;
      transition: transform 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Setup Screen -->
  <div class="setup-screen active" id="setupScreen">
    <div class="setup-logo"><span>C</span>iclo</div>
    <div class="setup-ornament">✦ ─────── ✦ ─────── ✦</div>
    <p class="setup-text">Para sincronizar seus dados entre dispositivos, cole abaixo suas chaves de acesso e o ID do bin.</p>
    <input class="setup-input" id="setupMasterKey" type="text" placeholder="X-Master-Key">
    <input class="setup-input" id="setupAccessKey" type="text" placeholder="X-Access-Key">
    <input class="setup-input" id="setupBinId" type="text" placeholder="Bin ID" style="margin-bottom: 20px;">
    <button class="setup-btn" id="setupBtn">Começar</button>
    <p class="setup-error" id="setupError">Preencha ambos os campos</p>
  </div>

  <!-- Main App -->
  <div id="appMain" style="display: none;">

    <!-- Header -->
    <header class="header">
      <div class="sync-indicator" id="syncIndicator">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">sync</span>
      </div>
      <h1><span>C</span>iclo</h1>
      <div class="header-actions">
        <button class="header-btn" id="btnSync" aria-label="Sincronizar" title="Sincronizar">↻</button>
      </div>
    </header>

    <!-- Calendar -->
    <section class="calendar-section">
      <div class="calendar-nav">
        <button id="prevMonth" aria-label="Mês anterior">◄</button>
        <div class="calendar-month" id="calendarMonth"></div>
        <button id="nextMonth" aria-label="Próximo mês">►</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot pill"></span>
          Pílula
        </div>
        <div class="legend-item">
          <span class="legend-square period"></span>
          Menstruação
        </div>
        <div class="legend-item">
          <span style="font-size:7px;color:var(--pill-color);font-weight:600;">15</span>
          Dia do ciclo
        </div>
      </div>
    </section>

    <!-- Cycle Status -->
    <div class="cycle-card" id="cycleCard" style="display: none;"></div>
  </div>

  <!-- Day Panel -->
  <div class="panel-overlay" id="panelOverlay">
    <div class="day-panel">
      <div class="panel-title" id="panelTitle">Registro</div>
      <div class="panel-date" id="panelDate"></div>
      <div class="panel-cycle-badge" id="panelCycleBadge" style="display: none;"></div>

      <div class="panel-section">
        <div class="panel-section-title">
          <span class="panel-section-icon">💊</span>
          Pílula
        </div>
        <div class="pill-toggle" id="pillToggle">
          <button class="pill-option" data-pill="false">Não tomou</button>
          <button class="pill-option" data-pill="true">Tomou</button>
        </div>
        <div class="pill-pause-msg" id="pillPauseMsg" style="display: none;">
          Período de pausa — não tomar a pílula
        </div>
        <div class="time-row" id="timeRow">
          <span class="time-label">Horário:</span>
          <input type="time" id="pillTime">
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-section-title">
          <span class="panel-section-icon">🔴</span>
          Menstruação
        </div>
        <div class="period-selector" id="periodSelector">
          <button class="period-option" data-level="none">
            <span class="period-icon">○</span>
            Não
          </button>
          <button class="period-option" data-level="light">
            <span class="period-icon">🩸</span>
            Leve
          </button>
          <button class="period-option" data-level="medium">
            <span class="period-icon">🩸🩸</span>
            Médio
          </button>
          <button class="period-option" data-level="heavy">
            <span class="period-icon">🩸🩸🩸</span>
            Intenso
          </button>
        </div>
      </div>

      <div class="panel-actions">
        <button class="btn btn-cancel" id="panelCancel">Cancelar</button>
        <button class="btn btn-confirm" id="panelSave">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ─── Config ───
    const STORAGE_KEYS = {
      data: 'ciclo_data',
      masterKey: 'ciclo_master_key',
      accessKey: 'ciclo_access_key',
      binId: 'ciclo_bin_id',
      lastSync: 'ciclo_last_sync'
    };

    const MONTHS_PT = [
      'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
      'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
    ];

    const WEEKDAYS_PT = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];

    // ─── State ───
    let data = {}; // { "2026-03-17": { pill: { taken, time }, period: { level } } }
    let currentYear, currentMonth;
    let selectedDate = null;
    let panelPill = false;
    let panelTime = '';
    let panelPeriod = 'none';

    // ─── Init ───
    function init() {
      const masterKey = localStorage.getItem(STORAGE_KEYS.masterKey);
      const accessKey = localStorage.getItem(STORAGE_KEYS.accessKey);
      const binId = localStorage.getItem(STORAGE_KEYS.binId);

      if (masterKey && accessKey && binId) {
        showApp();
      } else {
        document.getElementById('setupScreen').classList.add('active');
      }
    }

    // ─── Setup ───
    document.getElementById('setupBtn').addEventListener('click', () => {
      const masterKey = document.getElementById('setupMasterKey').value.trim();
      const accessKey = document.getElementById('setupAccessKey').value.trim();
      const binId = document.getElementById('setupBinId').value.trim();
      const error = document.getElementById('setupError');

      if (!masterKey || !accessKey || !binId) {
        error.textContent = 'Preencha todos os campos';
        error.style.display = 'block';
        return;
      }

      localStorage.setItem(STORAGE_KEYS.masterKey, masterKey);
      localStorage.setItem(STORAGE_KEYS.accessKey, accessKey);
      localStorage.setItem(STORAGE_KEYS.binId, binId);
      error.style.display = 'none';
      showApp();
    });

    function showApp() {
      document.getElementById('setupScreen').classList.remove('active');
      document.getElementById('appMain').style.display = 'block';

      // Load local data
      data = JSON.parse(localStorage.getItem(STORAGE_KEYS.data) || '{}');

      // Set current month
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();

      renderCalendar();
      renderCycleCard();
      syncFromRemote();
    }

    // ─── Calendar Rendering ───
    function renderCalendar() {
      document.getElementById('calendarMonth').textContent =
        `${MONTHS_PT[currentMonth]} ${currentYear}`;

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      // Weekday headers
      WEEKDAYS_PT.forEach(day => {
        const el = document.createElement('div');
        el.className = 'calendar-weekday';
        el.textContent = day;
        grid.appendChild(el);
      });

      // First day of month (0=Sun, adjust to Mon=0)
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const startOffset = firstDay === 0 ? 6 : firstDay - 1;

      // Days in month
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

      // Today
      const today = new Date();
      const todayStr = formatDateKey(today);

      // Empty cells
      for (let i = 0; i < startOffset; i++) {
        const el = document.createElement('div');
        el.className = 'calendar-day empty';
        grid.appendChild(el);
      }

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayData = data[dateKey];

        const el = document.createElement('div');
        el.className = 'calendar-day';

        if (dateKey === todayStr) el.classList.add('today');

        // Period background
        if (dayData?.period?.level && dayData.period.level !== 'none') {
          el.classList.add(`period-${dayData.period.level}`);
        }

        // Day number
        const num = document.createElement('span');
        num.textContent = d;
        el.appendChild(num);

        // Pill dot
        if (dayData?.pill?.taken) {
          const dot = document.createElement('span');
          dot.className = 'pill-dot';
          el.appendChild(dot);
        }

        // Cycle day indicator
        const isFuture = new Date(currentYear, currentMonth, d) > today;
        const cycleInfo = isFuture ? getCycleInfoForFuture(dateKey) : getCycleInfo(dateKey);

        if (cycleInfo) {
          const cycleNum = document.createElement('span');
          cycleNum.className = 'cycle-day-num';
          cycleNum.textContent = cycleInfo.phase === 'active'
            ? `${cycleInfo.dayInPhase}`
            : `P${cycleInfo.dayInPhase}`;
          el.appendChild(cycleNum);

          el.classList.add(cycleInfo.phase === 'active' ? 'active-day' : 'pause-day');

          if (cycleInfo.projected) {
            el.classList.add(cycleInfo.phase === 'active' ? 'future-active' : 'future-pause');
          }
        }

        el.addEventListener('click', () => openPanel(dateKey, d));
        grid.appendChild(el);
      }
    }

    function formatDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function formatDateDisplay(dateKey) {
      const parts = dateKey.split('-');
      const d = new Date(parts[0], parts[1] - 1, parts[2]);
      const days = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
      return `${days[d.getDay()]}, ${parts[2]} de ${MONTHS_PT[parseInt(parts[1]) - 1]}`;
    }

    // ─── Cycle Engine (24+4) ───
    const CYCLE_ACTIVE = 24;
    const CYCLE_PAUSE = 4;
    const CYCLE_TOTAL = CYCLE_ACTIVE + CYCLE_PAUSE;

    function parseDateKey(dateKey) {
      const [y, m, d] = dateKey.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function addDays(dateKey, n) {
      const d = parseDateKey(dateKey);
      d.setDate(d.getDate() + n);
      return formatDateKey(d);
    }

    function daysBetween(a, b) {
      return Math.round((parseDateKey(b) - parseDateKey(a)) / 86400000);
    }

    function getCycleInfo(dateKey) {
      // Walk backwards to find cycle start (first pill after gap > 4 days)
      let pillDates = [];
      let cursor = parseDateKey(dateKey);
      let gapCount = 0;

      for (let i = 0; i < 90; i++) {
        const key = formatDateKey(cursor);
        if (data[key]?.pill?.taken) {
          if (gapCount > CYCLE_PAUSE) break;
          gapCount = 0;
          pillDates.push(key);
        } else {
          gapCount++;
          if (gapCount > CYCLE_PAUSE && pillDates.length > 0) break;
        }
        cursor.setDate(cursor.getDate() - 1);
      }

      if (pillDates.length === 0) return null;

      pillDates.reverse(); // chronological order
      const cycleStart = pillDates[0];

      // Count pills taken from cycle start through dateKey
      let pillCount = 0;
      let lastActivePillDate = null;
      const totalDays = daysBetween(cycleStart, dateKey);

      for (let i = 0; i <= Math.max(totalDays, 0); i++) {
        const k = addDays(cycleStart, i);
        if (data[k]?.pill?.taken) {
          pillCount++;
          if (pillCount <= CYCLE_ACTIVE) lastActivePillDate = k;
        }
      }

      // Determine phase
      if (pillCount > 0 && pillCount <= CYCLE_ACTIVE) {
        // Check if dateKey itself has pill or is within active phase
        if (data[dateKey]?.pill?.taken) {
          return { phase: 'active', dayInPhase: pillCount, totalPhase: CYCLE_ACTIVE, cycleStart, pillCount };
        }
        // Day without pill but still in active phase (missed day or today not yet taken)
        return { phase: 'active', dayInPhase: pillCount, totalPhase: CYCLE_ACTIVE, cycleStart, pillCount };
      }

      if (pillCount >= CYCLE_ACTIVE && lastActivePillDate) {
        const pauseDay = daysBetween(lastActivePillDate, dateKey);
        if (pauseDay >= 1 && pauseDay <= CYCLE_PAUSE) {
          return { phase: 'pause', dayInPhase: pauseDay, totalPhase: CYCLE_PAUSE, cycleStart, pillCount: CYCLE_ACTIVE };
        }
      }

      return null;
    }

    function getCycleInfoForFuture(dateKey) {
      const todayKey = formatDateKey(new Date());
      const todayInfo = getCycleInfo(todayKey);
      if (!todayInfo) return null;

      const daysAhead = daysBetween(todayKey, dateKey);
      if (daysAhead <= 0) return null;

      // Project forward: determine today's position in the 28-day cycle
      let todayOffset;
      if (todayInfo.phase === 'active') {
        todayOffset = todayInfo.dayInPhase; // 1-24
      } else {
        todayOffset = CYCLE_ACTIVE + todayInfo.dayInPhase; // 25-28
      }

      const futureOffset = ((todayOffset - 1 + daysAhead) % CYCLE_TOTAL) + 1;

      if (futureOffset <= CYCLE_ACTIVE) {
        return { phase: 'active', dayInPhase: futureOffset, totalPhase: CYCLE_ACTIVE, projected: true };
      } else {
        return { phase: 'pause', dayInPhase: futureOffset - CYCLE_ACTIVE, totalPhase: CYCLE_PAUSE, projected: true };
      }
    }

    function renderCycleCard() {
      const container = document.getElementById('cycleCard');
      const todayKey = formatDateKey(new Date());
      const info = getCycleInfo(todayKey);

      if (!info) {
        container.style.display = 'none';
        return;
      }

      container.style.display = 'block';

      const phaseText = info.phase === 'active' ? 'Fase Ativa' : 'Pausa';
      const detailText = `Dia ${info.dayInPhase} de ${info.totalPhase}`;

      let dotsHtml = '';
      for (let i = 1; i <= CYCLE_ACTIVE; i++) {
        const filled = i <= info.pillCount ? 'filled' : '';
        dotsHtml += `<span class="cycle-progress-dot ${filled}"></span>`;
      }
      dotsHtml += '<span class="cycle-progress-separator"></span>';
      for (let i = 1; i <= CYCLE_PAUSE; i++) {
        const filled = (info.phase === 'pause' && i <= info.dayInPhase) ? 'filled' : '';
        dotsHtml += `<span class="cycle-progress-dot pause-dot ${filled}"></span>`;
      }

      container.innerHTML = `
        <div class="cycle-card-phase ${info.phase}">${phaseText}</div>
        <div class="cycle-card-detail">${detailText}</div>
        <div class="cycle-progress">${dotsHtml}</div>
        <div class="cycle-card-ornament">── ✦ ──</div>
      `;
    }

    // ─── Navigation ───
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    });

    // ─── Day Panel ───
    const panelOverlay = document.getElementById('panelOverlay');

    function openPanel(dateKey, dayNum) {
      selectedDate = dateKey;
      const existing = data[dateKey];

      // Set panel state
      panelPill = existing?.pill?.taken || false;
      panelTime = existing?.pill?.time || getCurrentTime();
      panelPeriod = existing?.period?.level || 'none';

      // Update UI
      document.getElementById('panelDate').textContent = formatDateDisplay(dateKey);

      // Cycle badge
      const cycleBadge = document.getElementById('panelCycleBadge');
      const cycleInfo = getCycleInfo(dateKey) || getCycleInfoForFuture(dateKey);
      const isPauseDay = cycleInfo?.phase === 'pause';
      if (cycleInfo) {
        cycleBadge.style.display = 'block';
        const phaseLabel = cycleInfo.phase === 'active' ? 'Fase ativa' : 'Pausa';
        cycleBadge.className = `panel-cycle-badge${isPauseDay ? ' pause-badge' : ''}`;
        cycleBadge.innerHTML = `<span class="badge-phase">${phaseLabel}</span> — Dia ${cycleInfo.dayInPhase} de ${cycleInfo.totalPhase}`;
      } else {
        cycleBadge.style.display = 'none';
      }

      // Pill toggle — disable on pause days
      const pillPauseMsg = document.getElementById('pillPauseMsg');
      const pillToggle = document.getElementById('pillToggle');
      const timeRow = document.getElementById('timeRow');
      if (isPauseDay) {
        pillToggle.style.display = 'none';
        timeRow.classList.remove('visible');
        pillPauseMsg.style.display = 'block';
      } else {
        pillToggle.style.display = 'flex';
        pillPauseMsg.style.display = 'none';

        // Pill toggle
        document.querySelectorAll('#pillToggle .pill-option').forEach(btn => {
          const val = btn.dataset.pill === 'true';
          btn.classList.toggle('selected', val === panelPill);
        });

        // Time row
        timeRow.classList.toggle('visible', panelPill);
      }
      document.getElementById('pillTime').value = panelTime;

      // Period selector
      document.querySelectorAll('#periodSelector .period-option').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.level === panelPeriod);
      });

      panelOverlay.classList.add('active');
    }

    function closePanel() {
      panelOverlay.classList.remove('active');
      selectedDate = null;
    }

    function getCurrentTime() {
      const now = new Date();
      return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }

    // Pill toggle events
    document.querySelectorAll('#pillToggle .pill-option').forEach(btn => {
      btn.addEventListener('click', () => {
        panelPill = btn.dataset.pill === 'true';
        document.querySelectorAll('#pillToggle .pill-option').forEach(b => {
          b.classList.toggle('selected', (b.dataset.pill === 'true') === panelPill);
        });
        const timeRow = document.getElementById('timeRow');
        timeRow.classList.toggle('visible', panelPill);
        if (panelPill && !document.getElementById('pillTime').value) {
          document.getElementById('pillTime').value = getCurrentTime();
        }
      });
    });

    // Period selector events
    document.querySelectorAll('#periodSelector .period-option').forEach(btn => {
      btn.addEventListener('click', () => {
        panelPeriod = btn.dataset.level;
        document.querySelectorAll('#periodSelector .period-option').forEach(b => {
          b.classList.toggle('selected', b.dataset.level === panelPeriod);
        });
      });
    });

    // Cancel
    document.getElementById('panelCancel').addEventListener('click', closePanel);
    panelOverlay.addEventListener('click', (e) => {
      if (e.target === panelOverlay) closePanel();
    });

    // Save
    document.getElementById('panelSave').addEventListener('click', () => {
      if (!selectedDate) return;

      const time = document.getElementById('pillTime').value || getCurrentTime();

      const dayEntry = {
        pill: {
          taken: panelPill,
          time: panelPill ? time : null
        },
        period: {
          level: panelPeriod
        }
      };

      // Only store if something is set
      if (!panelPill && panelPeriod === 'none') {
        delete data[selectedDate];
      } else {
        data[selectedDate] = dayEntry;
      }

      saveLocal();
      renderCalendar();
      renderCycleCard();
      closePanel();
      syncToRemote();
      showToast('Salvo ✓');
    });

    // ─── Storage ───
    function saveLocal() {
      localStorage.setItem(STORAGE_KEYS.data, JSON.stringify(data));
    }

    // ─── JSONBin Sync ───
    function getMasterKey() {
      return localStorage.getItem(STORAGE_KEYS.masterKey);
    }

    function getAccessKey() {
      return localStorage.getItem(STORAGE_KEYS.accessKey);
    }

    function getBinId() {
      return localStorage.getItem(STORAGE_KEYS.binId);
    }

    function setSyncStatus(status) {
      const dot = document.getElementById('syncDot');
      const text = document.getElementById('syncText');
      dot.className = 'sync-dot';

      switch (status) {
        case 'online':
          dot.classList.add('');
          text.textContent = 'sync';
          break;
        case 'syncing':
          dot.classList.add('syncing');
          text.textContent = 'sincronizando...';
          break;
        case 'offline':
          dot.classList.add('offline');
          text.textContent = 'offline';
          break;
        case 'error':
          dot.classList.add('offline');
          text.textContent = 'erro';
          break;
      }
    }

    async function syncToRemote() {
      const masterKey = getMasterKey();
      const accessKey = getAccessKey();
      const binId = getBinId();
      if (!masterKey || !accessKey || !binId) return;

      setSyncStatus('syncing');

      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': masterKey,
            'X-Access-Key': accessKey
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          localStorage.setItem(STORAGE_KEYS.lastSync, new Date().toISOString());
          setSyncStatus('online');
        } else {
          setSyncStatus('error');
        }
      } catch (e) {
        setSyncStatus('offline');
      }
    }

    async function syncFromRemote() {
      const masterKey = getMasterKey();
      const accessKey = getAccessKey();
      const binId = getBinId();
      if (!masterKey || !accessKey || !binId) return;

      setSyncStatus('syncing');

      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
          headers: {
            'X-Master-Key': masterKey,
            'X-Access-Key': accessKey
          }
        });

        if (response.ok) {
          const result = await response.json();
          const remoteData = result.record;

          if (remoteData && typeof remoteData === 'object') {
            // Merge: remote wins for conflicts, keep local-only entries
            data = mergeData(data, remoteData);
            saveLocal();
            renderCalendar();
            renderCycleCard();
          }

          setSyncStatus('online');
        } else {
          setSyncStatus('error');
        }
      } catch (e) {
        setSyncStatus('offline');
      }
    }

    function mergeData(local, remote) {
      const merged = { ...local };

      for (const key of Object.keys(remote)) {
        if (!merged[key]) {
          merged[key] = remote[key];
        } else {
          // If both exist, keep the one with more data
          const localHasData = merged[key].pill?.taken || (merged[key].period?.level && merged[key].period.level !== 'none');
          const remoteHasData = remote[key].pill?.taken || (remote[key].period?.level && remote[key].period.level !== 'none');

          if (remoteHasData && !localHasData) {
            merged[key] = remote[key];
          } else if (remoteHasData && localHasData) {
            // Merge fields: prefer taken=true, and keep highest period level
            const levels = ['none', 'light', 'medium', 'heavy'];
            merged[key] = {
              pill: {
                taken: merged[key].pill?.taken || remote[key].pill?.taken,
                time: (remote[key].pill?.taken ? remote[key].pill?.time : null) || merged[key].pill?.time
              },
              period: {
                level: levels.indexOf(remote[key].period?.level || 'none') > levels.indexOf(merged[key].period?.level || 'none')
                  ? remote[key].period.level
                  : merged[key].period.level
              }
            };
          }
        }
      }

      return merged;
    }

    // Sync button
    document.getElementById('btnSync').addEventListener('click', async () => {
      await syncFromRemote();
      showToast('Sincronizado ✓');
    });

    // ─── Toast ───
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
    }

    // ─── PWA ───
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // ─── Start ───
    init();
  </script>
</body>
